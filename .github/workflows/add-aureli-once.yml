name: Add Aureli once

on:
  push:
    branches:
      - add-aureli-allowlist-clean

permissions:
  contents: write

jobs:
  add-aureli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-aureli-allowlist-clean
      - name: Add Aureli and remove this workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('brands.txt')
          lines = p.read_text(encoding='utf-8').splitlines()
          lines = [line for line in lines if line != 'Aureli']
          idx = lines.index('Aune') + 1
          lines.insert(idx, 'Aureli')
          p.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/add-aureli-once.yml
          git config user.name "EdwardJSantos"
          git config user.email "30608787+EdwardJSantos@users.noreply.github.com"
          git add brands.txt .github/workflows/add-aureli-once.yml
          git commit -m "Add Aureli to brand allowlist"
          git push origin HEAD:add-aureli-allowlist-clean
